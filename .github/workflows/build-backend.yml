name: Build & push backend image

# Builds the UMPSAHLLM backend image and pushes it to GHCR so the NAS can simply
# `docker pull ghcr.io/<owner>/umpsahllm-backend:latest` instead of building locally.
#
# After the first run, make the package public (GitHub → Packages → umpsahllm-backend
# → Package settings → Change visibility → Public) so the NAS can pull without auth.

on:
  push:
    branches: [main]
    paths:
      - 'UMPSAHLLM/backend/**'
      - '.github/workflows/build-backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./UMPSAHLLM/backend
          file: ./UMPSAHLLM/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/umpsahllm-backend:latest
            ghcr.io/${{ github.repository_owner }}/umpsahllm-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
