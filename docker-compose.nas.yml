version: '3.8'

services:
  # AI Brain (Ollama)
  # This container handles the actual LLM models (llama3.1, etc.)
  ollama:
    image: ollama/ollama:latest
    container_name: umpsah-brain
    volumes:
      - ./ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: always

  # UMPSAHLLM Backend Bridge
  # This container runs the Node.js API and the PicoClaw engine
  backend:
    build:
      context: ./UMPSAHLLM/backend
      dockerfile: Dockerfile
    container_name: umpsah-backend
    environment:
      # Cloudflare tunnel ingress routes api.umpsahllm.com -> http://umpsah-backend:3001,
      # so the container MUST listen on 3001 to match the dashboard config.
      - PORT=3001
      - OLLAMA_HOST=http://ollama:11434
      - PICOCLAW_EXE_PATH=/picoclaw
      - NAS_MODEL=${NAS_MODEL:-llama3.1:8b}
      - CLOUD_LLM_API_KEY=${CLOUD_LLM_API_KEY}
      - CLOUD_LLM_BASE_URL=${CLOUD_LLM_BASE_URL:-https://api.openai.com/v1}
      - CLOUD_LLM_MODEL=${CLOUD_LLM_MODEL:-gpt-4o-mini}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-https://umpsahllm.web.app}
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./UMPSAHLLM/backend/training_data:/app/training_data
      - ./UMPSAHLLM/backend/vault:/app/vault
    depends_on:
      - ollama
    restart: always

  # Cloudflare Tunnel (Secure Public Access)
  # This exposes your local backend to the internet without opening ports
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: umpsah-tunnel
    # Replace the variable below with your token or use an .env file
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
    restart: always

